<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      .chatbox {
        display: flex;
      }

      #icon {
        position: fixed;
        margin: 10px;
        z-index: 999;
        cursor: pointer;
        left: 20px;
        top: 20px;
      }
      .icon img {
        width: 55px;
        height: auto;
      }
      #message {
        position: absolute;
        display: none;
        border: 2px solid black;
        border-radius: 10px;
      }
      .messChat {
        display: flex;
        gap: 10px;
        align-items: center;
        margin: 20px 10px;
      }
    </style>
  </head>
  <body>
    <div class="chatbox">
      <div class="icon" id="icon">
        <img
          onclick="iconChat()"
          src="../assets/img/25575d14-a0fe-4ceb-9fdf-b7e19947c08c.png"
          alt="icon"
        />
      </div>
      <div class="message" id="message">
        <div class="bodymessages">
          <div class="messChat">
            <img
              src="../assets/img/25575d14-a0fe-4ceb-9fdf-b7e19947c08c.png"
              alt="avatar"
              width="30"
              height="30"
            />
            <p>Hello Nguyễn Chí Vĩ</p>
          </div>
          <div class="send">
            <input type="text" placeholder="Hỏi bất kỳ điều gì..." />
            <button><i class="bi bi-send-fill"></i></button>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script>
    // Xuất hiện đoạn chat
    function iconChat() {
      const body = document.getElementById("message");
      if (body.style.display === "none" || body.style.display === "") {
        body.style.display = "inline";
      } else {
        body.style.display = "none";
      }
    }
    // di chuyển icon chatbox vị trí bất kỳ
    function iocn() {
      const move = document.getElementById("icon");
      let isMove = false;
      let offsetX, offsetY;
      move.addEventListener("mousedown", (e) => {
        isMove = true;
        offsetX = e.offsetX;
        offsetY = e.offsetY;
      });
      document.addEventListener("mousemove", (e) => {
        if (isMove) {
          move.style.left = e.pageX - offsetX + "px";
          move.style.top = e.pageY - offsetY + "px";
        }
      });
      document.addEventListener("mouseup", () => {
        isMove = false;
      });
    }
    iocn();
  </script>
</html>
